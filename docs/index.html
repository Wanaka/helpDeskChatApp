<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helpdesk Chat</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p  { font-size: 1rem; opacity: 0.85; }
  </style>
</head>
<body>
  <div>
    <h1>Opening Helpdesk Chat…</h1>
    <p>If nothing happens, you may need to install the app first.</p>
  </div>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const adminId = params.get('adminId') || '';

    const appLink   = 'https://helpdeskchatapp.web.app/?adminId=' + adminId;
    const playStore = 'https://play.google.com/store/apps/details'
                    + '?id=haag.your.next.developer'
                    + '&referrer=' + encodeURIComponent('adminId=' + adminId);

    // Try to open the app via App Link; fall back to Play Store after 1.5 s
    window.location.href = 'https://helpdeskchatapp.web.app/?adminId=' + adminId;
    setTimeout(function () {
      window.location.href = playStore;
    }, 1500);
  </script>
</body>
</html>
